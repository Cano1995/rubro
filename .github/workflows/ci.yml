name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend tests ────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rubro
          POSTGRES_PASSWORD: rubro_dev
          POSTGRES_DB: rubro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://rubro:rubro_dev@localhost:5432/rubro_test
      DATABASE_URL: postgresql+asyncpg://rubro:rubro_dev@localhost:5432/rubro_test
      SECRET_KEY: ci-secret-key-not-for-production
      ENVIRONMENT: testing
      RESEND_API_KEY: ""

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v --tb=short

  # ─── Frontend type-check ──────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend TypeCheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ─── Deploy to Railway (solo en push a main) ─────────────────────────────
  # Requiere secrets en GitHub:
  #   RAILWAY_TOKEN          → Settings > API Keys en railway.app
  #   RAILWAY_BACKEND_ID     → Service ID del backend (Railway dashboard → Settings)
  #   RAILWAY_FRONTEND_ID    → Service ID del frontend
  deploy:
    name: Deploy to Railway
    needs: [backend-tests, frontend-typecheck]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_BACKEND_ID" ]; then
            echo "Railway secrets not configured, skipping."
            exit 0
          fi
          railway up --service "$RAILWAY_BACKEND_ID" --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_BACKEND_ID: ${{ secrets.RAILWAY_BACKEND_ID }}

      - name: Deploy frontend
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_FRONTEND_ID" ]; then
            echo "Railway secrets not configured, skipping."
            exit 0
          fi
          railway up --service "$RAILWAY_FRONTEND_ID" --detach
        working-directory: frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_FRONTEND_ID: ${{ secrets.RAILWAY_FRONTEND_ID }}
